<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste da Água</title>

<!-- FONTE PROFISSIONAL -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0A2540, #1E90FF);
  color:white;
  text-align:center;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1 {
  font-size:26px;
  font-weight:700;
}

h2 {
  font-weight:600;
}

p {
  font-weight:300;
}

.logo {
  width:120px;
  margin-bottom:15px;
}

button {
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  background:white;
  color:#0A2540;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
  background:#00BFFF;
  color:white;
}

.progress {
  height:6px;
  background:#ffffff30;
  margin-bottom:20px;
  border-radius:10px;
}

.bar {
  height:6px;
  background:#00BFFF;
  width:0%;
  border-radius:10px;
  transition:0.4s;
}

.fade {
  animation:fade 0.5s;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.cta {
  background:#00BFFF;
  color:white;
  font-size:18px;
  font-weight:700;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGO (opcional) -->
<!-- Coloque a logo da ULFER aqui se quiser -->
<!-- <img src="logo.png" class="logo"> -->

<h1>⚠️ A água que você bebe pode estar te prejudicando</h1>

<p>Responda esse teste rápido e descubra o risco oculto na sua casa</p>

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="quiz"></div>

</div>

<script>

const perguntas = [
"De onde vem sua água?",
"Você já testou sua água?",
"Você confia 100% nela?",
"Tem crianças ou idosos na casa?",
"Se tivesse impurezas invisíveis, você mudaria isso?"
];

const opcoes = [
["Torneira (CAGEPA)","Água mineral","Água de chuva","Não sei"],
["Sim","Não","Nunca pensei nisso"],
["Sim","Mais ou menos","Não"],
["Sim","Não"],
["Sim na hora","Talvez","Não sei"]
];

let atual = 0;

function carregar(){
  let html = `<div class="fade"><h2>${perguntas[atual]}</h2>`;
  opcoes[atual].forEach(o=>{
    html += `<button onclick="proxima()">${o}</button>`;
  });
  html += `</div>`;

  document.getElementById("quiz").innerHTML = html;
  document.getElementById("bar").style.width = ((atual+1)/perguntas.length)*100 + "%";
}

function proxima(){
  atual++;
  if(atual < perguntas.length){
    carregar();
  } else {
    document.getElementById("quiz").innerHTML = `
    <div class="fade">

    <h2>⚠️ RESULTADO: POSSÍVEL RISCO NA SUA ÁGUA</h2>

    <p>Sua água pode conter excesso de cloro, impurezas e contaminações invisíveis.</p>

    <p>Mesmo água tratada ou mineral pode perder qualidade até chegar na sua casa.</p>

    <h3>👉 Proteja sua família com água realmente pura</h3>

    <button class="cta" onclick="window.location.href='https://wa.me/5581995655408'">
    QUERO FAZER UM TESTE NA MINHA CASA
    </button>

    </div>
    `;
  }
}

carregar();

</script>

</body>
</html>
