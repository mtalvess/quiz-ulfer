<div class="container">

<h1>⚠️ DESCUBRA SE SUA ÁGUA ESTÁ TE FAZENDO MAL</h1>
<p>Responda rápido e veja a verdade sobre a água da sua casa</p>

<div class="progress"><div class="bar" id="bar"></div></div>
<div id="quiz"></div>

</div>

<script>
const perguntas = [
  {text: "Você sabe o que tem na água que sua família bebe?", img:"agua1.jpg"},
  {text: "Você teria coragem de beber água se visse contaminantes microscopicos?", img:"agua2.jpg"},
  {text: "Se a água estivesse prejudicando sua saúde aos poucos, você perceberia?", img:"agua3.jpg"},
  {text: "Quanto vale a saúde da sua família pra você?", img:"familia.jpg"},
  {text: "Se existisse uma solução simples para água 100% pura, você faria hoje?", img:"ulfer_produto.jpg"}
];

const opcoes = [
  ["Sim, sei","Nunca pensei nisso","Prefiro não saber"],
  ["Sim","Não","Não sei"],
  ["Provavelmente não","Acho que sim","Nunca pensei nisso"],
  ["Tudo","Depende","Não sei"],
  ["Sim, imediatamente","Talvez","Não sei"]
];

let atual = 0;

function carregar(){
  let q = perguntas[atual];
  let html = `<div class="fade">
                <h2>${q.text}</h2>
                <img src="${q.img}" style="border-radius:12px; margin:10px 0; width:100%">
              `;
  opcoes[atual].forEach(o=>{
    html += `<button onclick="proxima()">${o}</button>`;
  });
  html += `</div>`;

  document.getElementById("quiz").innerHTML = html;
  document.getElementById("bar").style.width = ((atual+1)/perguntas.length)*100 + "%";
}

function proxima(){
  atual++;
  if(atual < perguntas.length){
    carregar();
  } else {
    document.getElementById("quiz").innerHTML = `
    <div class="fade">
      <h2>🚨 SUA ÁGUA PODE ESTAR TE PREJUDICANDO!</h2>
      <img src="ulfer_final.jpg" style="border-radius:12px; margin:10px 0; width:100%">
      <p>Mesmo água tratada pode conter impurezas invisíveis. O purificador ULFER garante água pura para você e sua família.</p>
      <button class="cta" onclick="window.location.href='https://wa.me/5581995655408'">
        QUERO MINHA ÁGUA PURA AGORA
      </button>
    </div>
    `;
  }
}

carregar();
</script>
