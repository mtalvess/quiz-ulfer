<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Descubra a Verdade Sobre Sua Água</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg, #000428, #004e92);
  color:white;
  text-align:center;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1 {
  font-size:32px;
  font-weight:800;
}

h2 {
  font-weight:700;
  font-size:24px;
}

p {
  font-weight:300;
  font-size:16px;
}

button {
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  background:white;
  color:#000428;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
  background:#00c6ff;
  color:white;
}

.progress {
  height:6px;
  background:#ffffff30;
  margin-bottom:20px;
  border-radius:10px;
}

.bar {
  height:6px;
  background:#00c6ff;
  width:0%;
  border-radius:10px;
  transition:0.4s;
}

.fade {
  animation:fade 0.4s;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.cta {
  background:#00c6ff;
  color:white;
  font-size:20px;
  font-weight:800;
}

</style>
</head>

<body>

<div class="container">

<h1>⚠️💧 DESCUBRA A VERDADE SOBRE SUA ÁGUA 💧⚠️</h1>
<p>Responda rápido e veja se sua água está segura para sua família</p>

<div class="progress"><div class="bar" id="bar"></div></div>
<div id="quiz"></div>

</div>

<script>
const perguntas = [
  "💦 Você sabe o que tem na água que sua família bebe TODOS OS DIAS?",
  "🔬 Você teria coragem de beber sua água se visse o que existe nela no microscópio?",
  "❓ Você confia mais na sorte ou na qualidade da água que entra na sua casa?",
  "⚠️ Se sua água estivesse prejudicando sua saúde aos poucos, você perceberia?",
  "💰 Quanto vale a saúde da sua família pra você?",
  "✅ Se existisse uma solução simples pra eliminar esse risco, você faria isso hoje?"
];

const opcoes = [
  ["💡 Sim, sei exatamente","🤔 Nunca pensei nisso","🙈 Prefiro nem saber"],
  ["😱 Sim","🙄 Não","👀 Nunca vi isso"],
  ["🍀 Confio na sorte","💧 Confio na água","🤷 Agora fiquei na dúvida"],
  ["🙁 Provavelmente não","🙂 Acho que sim","😶 Nunca pensei nisso"],
  ["💎 Tudo","⚖️ Depende","❌ Nunca pensei nisso"],
  ["🚀 Sim, sem pensar","🤔 Talvez","❌ Não sei"]
];

let atual = 0;

function carregar(){
  let html = `<div class="fade"><h2>${perguntas[atual]}</h2>`;
  opcoes[atual].forEach(o=>{
    html += `<button onclick="proxima()">${o}</button>`;
  });
  html += `</div>`;

  document.getElementById("quiz").innerHTML = html;
  document.getElementById("bar").style.width = ((atual+1)/perguntas.length)*100 + "%";
}

function proxima(){
  atual++;
  if(atual < perguntas.length){
    carregar();
  } else {
    document.getElementById("quiz").innerHTML = `
    <div class="fade">
      <h2>🚨💧 ALERTA: SUA ÁGUA PODE ESTAR TE PREJUDICANDO 💧🚨</h2>
      <p>Mesmo água tratada pode conter excesso de cloro, impurezas e contaminantes invisíveis.</p>
      <p>Isso pode afetar sua saúde e da sua família sem perceber.</p>
      <h3>✅ A solução é ter controle TOTAL da sua água em casa com o purificador ULFER</h3>
      <button class="cta" onclick="window.location.href='https://wa.me/5581995655408'">
        💦 QUERO ÁGUA PURA NA MINHA CASA AGORA 💦
      </button>
    </div>
    `;
  }
}

carregar();
</script>

</body>
</html>
